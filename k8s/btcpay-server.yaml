apiVersion: v1
kind: Namespace
metadata:
  name: btcpay
  labels:
    app.kubernetes.io/part-of: marky-payments
---
apiVersion: longhorn.io/v1beta2
kind: RecurringJob
metadata:
  name: blockchain-snapshot-cleanup
  namespace: longhorn-system
  labels:
    app.kubernetes.io/part-of: marky-payments
spec:
  name: blockchain-snapshot-cleanup
  task: snapshot-cleanup
  cron: "15 4 * * *"
  retain: 0
  concurrency: 1
  groups:
    - blockchain-reclaim
  labels:
    managed-by: codex
    scope: blockchain-reclaim
---
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: longhorn-blockchain-single
  annotations:
    storageclass.kubernetes.io/is-default-class: "false"
  labels:
    app.kubernetes.io/part-of: marky-payments
    storage.raphcvr.me/profile: rebuildable-single-replica
provisioner: driver.longhorn.io
reclaimPolicy: Retain
allowVolumeExpansion: true
volumeBindingMode: WaitForFirstConsumer
parameters:
  dataLocality: strict-local
  fromBackup: ""
  fsType: ext4
  numberOfReplicas: "1"
  recurringJobSelector: '[{"name":"blockchain-reclaim","isGroup":true}]'
  staleReplicaTimeout: "2880"
---
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: local-blockchain-h9q
  annotations:
    storageclass.kubernetes.io/is-default-class: "false"
  labels:
    app.kubernetes.io/part-of: marky-payments
    storage.raphcvr.me/profile: rebuildable-local-chainstate
provisioner: kubernetes.io/no-provisioner
reclaimPolicy: Retain
volumeBindingMode: WaitForFirstConsumer
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: btcpay-bitcoin-local-h9q
  labels:
    app.kubernetes.io/name: btcpay-bitcoind
    app.kubernetes.io/part-of: marky-payments
    storage.raphcvr.me/profile: rebuildable-local-chainstate
spec:
  capacity:
    storage: 90Gi
  volumeMode: Filesystem
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: local-blockchain-h9q
  claimRef:
    namespace: btcpay
    name: bitcoin-data-btcpay-bitcoind-0
  local:
    path: /var/mnt/longhorn/blockchain-local/bitcoin
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: kubernetes.io/hostname
              operator: In
              values:
                - talos-h9q-3tl
---
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: longhorn-blockchain-nvme-single
  annotations:
    storageclass.kubernetes.io/is-default-class: "false"
  labels:
    app.kubernetes.io/part-of: marky-payments
    storage.raphcvr.me/profile: rebuildable-single-replica-nvme
provisioner: driver.longhorn.io
reclaimPolicy: Retain
allowVolumeExpansion: true
volumeBindingMode: WaitForFirstConsumer
parameters:
  dataLocality: strict-local
  diskSelector: nvme
  fromBackup: ""
  fsType: ext4
  numberOfReplicas: "1"
  recurringJobSelector: '[{"name":"blockchain-reclaim","isGroup":true}]'
  staleReplicaTimeout: "2880"
---
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: longhorn-payment-state-retain-2
  annotations:
    storageclass.kubernetes.io/is-default-class: "false"
  labels:
    app.kubernetes.io/part-of: marky-payments
    storage.raphcvr.me/profile: important-small-state
provisioner: driver.longhorn.io
reclaimPolicy: Retain
allowVolumeExpansion: true
volumeBindingMode: Immediate
parameters:
  dataLocality: disabled
  fromBackup: ""
  fsType: ext4
  numberOfReplicas: "2"
  staleReplicaTimeout: "2880"
---
apiVersion: v1
kind: Service
metadata:
  name: btcpay-bitcoind
  namespace: btcpay
  labels:
    app.kubernetes.io/name: btcpay-bitcoind
    app.kubernetes.io/part-of: marky-payments
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: btcpay-bitcoind
    app.kubernetes.io/part-of: marky-payments
  ports:
    - name: rpc
      port: 43782
      targetPort: rpc
    - name: p2p
      port: 8333
      targetPort: p2p
    - name: zmq-block
      port: 28332
      targetPort: zmq-block
    - name: zmq-tx
      port: 28333
      targetPort: zmq-tx
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: btcpay-bitcoind
  namespace: btcpay
  labels:
    app.kubernetes.io/name: btcpay-bitcoind
    app.kubernetes.io/part-of: marky-payments
spec:
  serviceName: btcpay-bitcoind
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: btcpay-bitcoind
      app.kubernetes.io/part-of: marky-payments
  template:
    metadata:
      labels:
        app.kubernetes.io/name: btcpay-bitcoind
        app.kubernetes.io/part-of: marky-payments
    spec:
      automountServiceAccountToken: false
      enableServiceLinks: false
      nodeSelector:
        kubernetes.io/hostname: talos-h9q-3tl
      securityContext:
        fsGroup: 101
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: bitcoind
          image: btcpayserver/bitcoin:29.2
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 43782
              name: rpc
            - containerPort: 8333
              name: p2p
            - containerPort: 28332
              name: zmq-block
            - containerPort: 28333
              name: zmq-tx
          env:
            - name: BITCOIN_NETWORK
              value: mainnet
            - name: BITCOIN_RPC_USER
              valueFrom:
                secretKeyRef:
                  name: btcpay-core-secrets
                  key: BITCOIN_RPC_USER
            - name: BITCOIN_RPC_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: btcpay-core-secrets
                  key: BITCOIN_RPC_PASSWORD
            - name: BITCOIN_EXTRA_ARGS
              value: |
                server=1
                listen=1
                discover=1
                dnsseed=1
                maxconnections=96
                txindex=0
                dbcache=4096
                par=6
                checkblocks=1
                prune=55000
                whitelist=download,noban,mempool,relay@10.0.0.0/8
                whitelist=download,noban,mempool,relay@172.16.0.0/12
                whitelist=download,noban,mempool,relay@192.168.0.0/16
                rpcbind=0.0.0.0
                rpcallowip=10.0.0.0/8
                rpcallowip=172.16.0.0/12
                rpcallowip=192.168.0.0/16
                rpcport=43782
                rpcuser=$(BITCOIN_RPC_USER)
                rpcpassword=$(BITCOIN_RPC_PASSWORD)
                zmqpubrawblock=tcp://0.0.0.0:28332
                zmqpubrawtx=tcp://0.0.0.0:28333
          startupProbe:
            tcpSocket:
              port: rpc
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 120
          readinessProbe:
            tcpSocket:
              port: rpc
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            tcpSocket:
              port: rpc
            initialDelaySeconds: 300
            periodSeconds: 60
            timeoutSeconds: 3
            failureThreshold: 10
          resources:
            requests:
              cpu: "2"
              memory: 6Gi
            limits:
              cpu: "6"
              memory: 12Gi
          volumeMounts:
            - name: bitcoin-data
              mountPath: /data
  volumeClaimTemplates:
    - metadata:
        name: bitcoin-data
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: local-blockchain-h9q
        resources:
          requests:
            storage: 90Gi
---
apiVersion: v1
kind: Service
metadata:
  name: btcpay-nbxplorer
  namespace: btcpay
  labels:
    app.kubernetes.io/name: btcpay-nbxplorer
    app.kubernetes.io/part-of: marky-payments
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: btcpay-nbxplorer
    app.kubernetes.io/part-of: marky-payments
  ports:
    - name: http
      port: 32838
      targetPort: http
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: btcpay-nbxplorer
  namespace: btcpay
  labels:
    app.kubernetes.io/name: btcpay-nbxplorer
    app.kubernetes.io/part-of: marky-payments
spec:
  serviceName: btcpay-nbxplorer
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: btcpay-nbxplorer
      app.kubernetes.io/part-of: marky-payments
  template:
    metadata:
      labels:
        app.kubernetes.io/name: btcpay-nbxplorer
        app.kubernetes.io/part-of: marky-payments
    spec:
      automountServiceAccountToken: false
      enableServiceLinks: false
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: nbxplorer
          image: nicolasdorier/nbxplorer:2.5.30
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 32838
              name: http
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: btcpay-postgres-central
                  key: username
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: btcpay-postgres-central
                  key: password
            - name: BITCOIN_RPC_USER
              valueFrom:
                secretKeyRef:
                  name: btcpay-core-secrets
                  key: BITCOIN_RPC_USER
            - name: BITCOIN_RPC_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: btcpay-core-secrets
                  key: BITCOIN_RPC_PASSWORD
            - name: LITECOIN_RPC_USER
              valueFrom:
                secretKeyRef:
                  name: btcpay-litecoin-secrets
                  key: LITECOIN_RPC_USER
            - name: LITECOIN_RPC_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: btcpay-litecoin-secrets
                  key: LITECOIN_RPC_PASSWORD
          args:
            - --network=mainnet
            - --chains=btc,ltc
            - --bind=0.0.0.0
            - --port=32838
            - --datadir=/datadir
            - --postgres=User ID=$(POSTGRES_USER);Password=$(POSTGRES_PASSWORD);Host=postgresql-ha-rw.database.svc.cluster.local;Port=5432;Application Name=nbxplorer;Database=nbxplorermainnet
            - --btcrpcurl=http://btcpay-bitcoind:43782/
            - --btcrpcuser=$(BITCOIN_RPC_USER)
            - --btcrpcpassword=$(BITCOIN_RPC_PASSWORD)
            - --btcnodeendpoint=btcpay-bitcoind:8333
            - --ltcrpcurl=http://btcpay-litecoind:9332/
            - --ltcrpcuser=$(LITECOIN_RPC_USER)
            - --ltcrpcpassword=$(LITECOIN_RPC_PASSWORD)
            - --ltcnodeendpoint=btcpay-litecoind:9333
          startupProbe:
            tcpSocket:
              port: http
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 60
          readinessProbe:
            tcpSocket:
              port: http
            periodSeconds: 20
            timeoutSeconds: 3
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 60
            periodSeconds: 60
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: nbxplorer-data
              mountPath: /datadir
  volumeClaimTemplates:
    - metadata:
        name: nbxplorer-data
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: longhorn-blockchain-single
        resources:
          requests:
            storage: 20Gi
---
apiVersion: v1
kind: Service
metadata:
  name: btcpay-server
  namespace: btcpay
  labels:
    app.kubernetes.io/name: btcpay-server
    app.kubernetes.io/part-of: marky-payments
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: btcpay-server
    app.kubernetes.io/part-of: marky-payments
  ports:
    - name: http
      port: 80
      targetPort: http
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: btcpay-server
  namespace: btcpay
  labels:
    app.kubernetes.io/name: btcpay-server
    app.kubernetes.io/part-of: marky-payments
spec:
  serviceName: btcpay-server
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: btcpay-server
      app.kubernetes.io/part-of: marky-payments
  template:
    metadata:
      labels:
        app.kubernetes.io/name: btcpay-server
        app.kubernetes.io/part-of: marky-payments
    spec:
      automountServiceAccountToken: false
      enableServiceLinks: false
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: btcpay-server
          image: btcpayserver/btcpayserver:2.2.1
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 49392
              name: http
          env:
            - name: BTCPAY_NETWORK
              value: mainnet
            - name: BTCPAY_BIND
              value: 0.0.0.0:49392
            - name: BTCPAY_ROOTPATH
              value: /
            - name: BTCPAY_EXTERNALURL
              value: https://pay.markshnaknaks.com/
            - name: BTCPAY_DOCKERDEPLOYMENT
              value: "false"
            - name: BTCPAY_CHAINS
              value: btc,ltc
            - name: BTCPAY_BTCEXPLORERURL
              value: http://btcpay-nbxplorer:32838/
            - name: BTCPAY_BTCEXPLORERCOOKIEFILE
              value: /root/.nbxplorer/Main/.cookie
            - name: BTCPAY_LTCEXPLORERURL
              value: http://btcpay-nbxplorer:32838/
            - name: BTCPAY_LTCEXPLORERCOOKIEFILE
              value: /root/.nbxplorer/Main/.cookie
            - name: ASPNETCORE_FORWARDEDHEADERS_ENABLED
              value: "true"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: btcpay-postgres-central
                  key: password
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: btcpay-postgres-central
                  key: username
            - name: BTCPAY_POSTGRES
              value: User ID=$(POSTGRES_USER);Password=$(POSTGRES_PASSWORD);Host=postgresql-ha-rw.database.svc.cluster.local;Port=5432;Application Name=btcpayserver;Database=btcpayservermainnet
            - name: BTCPAY_EXPLORERPOSTGRES
              value: User ID=$(POSTGRES_USER);Password=$(POSTGRES_PASSWORD);Host=postgresql-ha-rw.database.svc.cluster.local;Port=5432;Application Name=btcpayserver;Database=nbxplorermainnet
          startupProbe:
            tcpSocket:
              port: http
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 60
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: http
            periodSeconds: 20
            timeoutSeconds: 5
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 90
            periodSeconds: 60
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 150m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: btcpay-data
              mountPath: /datadir
            - name: nbxplorer-cookie
              mountPath: /root/.nbxplorer
              readOnly: true
      volumes:
        - name: nbxplorer-cookie
          persistentVolumeClaim:
            claimName: nbxplorer-data-btcpay-nbxplorer-0
            readOnly: true
  volumeClaimTemplates:
    - metadata:
        name: btcpay-data
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: longhorn-payment-state-retain-2
        resources:
          requests:
            storage: 10Gi
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: btcpay-server
  namespace: btcpay
  labels:
    app.kubernetes.io/name: btcpay-server
    app.kubernetes.io/part-of: marky-payments
  annotations:
    nginx.ingress.kubernetes.io/backend-protocol: HTTP
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: 10m
    nginx.ingress.kubernetes.io/proxy-buffer-size: 16k
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  rules:
    - host: pay.markshnaknaks.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: btcpay-server
                port:
                  name: http
