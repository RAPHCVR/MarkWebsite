apiVersion: v1
kind: Namespace
metadata:
  name: marky
  labels:
    app.kubernetes.io/part-of: marky-storefront
---
apiVersion: v1
kind: Service
metadata:
  name: marky-storefront
  namespace: marky
  labels:
    app.kubernetes.io/name: marky-storefront
    app.kubernetes.io/part-of: marky-storefront
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: marky-storefront
    app.kubernetes.io/part-of: marky-storefront
  ports:
    - name: http
      port: 80
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: marky-storefront
  namespace: marky
  labels:
    app.kubernetes.io/name: marky-storefront
    app.kubernetes.io/part-of: marky-storefront
spec:
  replicas: 2
  revisionHistoryLimit: 5
  minReadySeconds: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: marky-storefront
      app.kubernetes.io/part-of: marky-storefront
  template:
    metadata:
      labels:
        app.kubernetes.io/name: marky-storefront
        app.kubernetes.io/part-of: marky-storefront
    spec:
      automountServiceAccountToken: false
      enableServiceLinks: false
      imagePullSecrets:
        - name: ghcr-secret
      securityContext:
        fsGroup: 1001
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: web
          image: ghcr.io/raphcvr/markwebsite@sha256:cf5456aaf775ed37f9154aa71b6f15c0f2fc258ad84105ec3f5a4a1c29a1b98a
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: NODE_ENV
              value: production
            - name: SOLANA_PAY_VERIFY_TIMEOUT_MS
              value: "8000"
          envFrom:
            - secretRef:
                name: marky-payments
                optional: true
            - secretRef:
                name: marky-postgres
                optional: true
          startupProbe:
            httpGet:
              path: /api/health
              port: http
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 24
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            periodSeconds: 10
            timeoutSeconds: 2
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 2
          resources:
            requests:
              cpu: 25m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            runAsGroup: 1001
            runAsNonRoot: true
            runAsUser: 1001
          volumeMounts:
            - mountPath: /tmp
              name: tmp
            - mountPath: /app/.next/cache
              name: next-cache
      volumes:
        - name: tmp
          emptyDir: {}
        - name: next-cache
          emptyDir: {}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: marky-storefront
  namespace: marky
  labels:
    app.kubernetes.io/name: marky-storefront
    app.kubernetes.io/part-of: marky-storefront
  annotations:
    nginx.ingress.kubernetes.io/backend-protocol: HTTP
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: 2m
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "120"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  rules:
    - host: markshnaknaks.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: marky-storefront
                port:
                  name: http
    - host: www.markshnaknaks.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: marky-storefront
                port:
                  name: http
